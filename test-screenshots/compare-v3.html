<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nexora V3 Comparison</title>
  <style>
    body { background:#07070d; color:#fff; font-family: Arial, sans-serif; padding:20px; }
    .row { display:flex; gap:12px; flex-wrap:wrap; }
    .col { flex:1 1 320px; background:#0b0b11; padding:8px; border-radius:8px; }
    img { max-width:100%; height:auto; display:block; border-radius:6px; }
    h2 { margin:8px 0; font-size:16px; }
    .note { font-size:13px; color:#cfcbd0; }
  </style>
</head>
<body>
  <h1>Comparatif Nexora V3 — Avant / Après</h1>
  <p class="note">Avant = sans "-v3" suffix, Après = fichiers avec "-v3" suffix. Ouvrir sur mobile/emulateur pour contrôle final.</p>
  <div class="row">
    <div class="col">
      <h2>Avant — Médaillon (core)</h2>
      <img src="nexora-iphone14-core.png" alt="core before">
    </div>
    <div class="col">
      <h2>Après (V3) — Médaillon (core)</h2>
      <img src="nexora-iphone14-core-v3.png" alt="core after">
    </div>
  </div>
  <hr style="margin:18px 0;border-color:#1d1d24">
  <div class="row">
    <div class="col">
      <h2>Avant — Dashboard complet</h2>
      <img src="nexora-iphone14-dashboard.png" alt="dashboard before">
    </div>
    <div class="col">
      <h2>Après (V3) — Dashboard complet</h2>
      <img src="nexora-iphone14-dashboard-v3.png" alt="dashboard after">
    </div>
  </div>
</body>
</html>
